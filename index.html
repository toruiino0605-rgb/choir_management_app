<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
input,select,textarea{font-size:16px!important;font-family:'Noto Sans JP',sans-serif}
input[type="number"]{font-size:24px!important}
:root{
--orange:#F5A623;--orange-light:#FFF3E0;--orange-dark:#E8950F;
--green:#4CAF50;--green-light:#E8F5E9;
--red:#EF5350;--red-light:#FFEBEE;
--bg:#FAF9F7;--card:#FFF;--text:#2D2D2D;--text-sub:#888;--border:#F0EEEB;
--shadow:0 1px 4px rgba(0,0,0,.06);--radius:12px;
--tab-h:64px;--safe-b:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;overscroll-behavior:none}
.app{display:flex;flex-direction:column;height:100%;max-width:480px;margin:0 auto;position:relative;overflow:hidden}
.main{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:calc(var(--tab-h) + var(--safe-b) + 8px);-webkit-overflow-scrolling:touch}
/* Tab bar */
.tabs{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;display:flex;background:var(--card);border-top:1px solid var(--border);padding-bottom:var(--safe-b);z-index:100;height:calc(var(--tab-h) + var(--safe-b))}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border:none;background:none;color:var(--text-sub);font-size:10px;font-weight:500;font-family:inherit;cursor:pointer;padding:6px 0;transition:color .2s}
.tab.on{color:var(--orange)}
.tab svg{width:22px;height:22px}
/* Header */
.hdr{background:var(--card);padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:center;position:relative}
.hdr h1{font-size:16px;font-weight:600}
.hdr-r{position:absolute;right:12px;top:50%;transform:translateY(-50%);display:flex;gap:6px}
.hdr-r button{background:none;border:none;color:var(--orange);cursor:pointer;padding:4px}
/* Toggle */
.tog{display:flex;margin:12px 16px;background:#F0EEEB;border-radius:25px;padding:3px}
.tog button{flex:1;padding:8px 0;border-radius:22px;border:none;font-size:14px;font-weight:600;cursor:pointer;transition:all .25s;font-family:inherit;background:transparent;color:var(--text-sub)}
.tog .on-e{background:var(--orange);color:#fff}
.tog .on-i{background:var(--green);color:#fff}
/* Date selector */
.dsel{display:flex;align-items:center;justify-content:center;gap:12px;padding:8px 16px}
.dsel span{font-size:15px;font-weight:500;min-width:180px;text-align:center}
.dbtn{background:none;border:none;cursor:pointer;color:var(--text-sub);padding:8px;border-radius:50%}
.dbtn:active{background:var(--border)}
/* Amount */
.amt-wrap{display:flex;align-items:center;gap:8px;padding:0 16px;margin:8px 0 12px}
.amt-wrap label{font-size:14px;font-weight:600;white-space:nowrap}
.amt-in{flex:1;padding:10px 12px;border:none;border-bottom:2px solid var(--border);font-size:24px!important;font-weight:600;font-family:inherit;background:var(--orange-light);border-radius:6px 6px 0 0;outline:none;text-align:right}
.amt-in:focus{border-bottom-color:var(--orange)}
.amt-u{font-size:16px;font-weight:600;color:var(--text-sub)}
/* Category grid */
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:12px 16px}
.cat-it{display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 8px;background:var(--card);border:2px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:all .2s;font-size:12px;font-weight:500;color:var(--text)}
.cat-it.sel{border-color:var(--orange);background:var(--orange-light)}
.cat-it.sel-i{border-color:var(--green);background:var(--green-light)}
.cat-it.dash{border-style:dashed;color:var(--text-sub)}
/* Form */
.fg{padding:0 16px;margin-bottom:12px}
.fl{font-size:12px;color:var(--text-sub);margin-bottom:4px;display:block;font-weight:500}
.fi{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:16px!important;font-family:inherit;background:var(--card);color:var(--text);outline:none;transition:border-color .2s}
.fi:focus{border-color:var(--orange)}
.fsel{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:16px!important;font-family:inherit;background:var(--card);color:var(--text);outline:none;appearance:none;-webkit-appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l5 5 5-5' stroke='%23888' fill='none' stroke-width='2' stroke-linecap='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 12px center}
/* Submit */
.sbtn{margin:16px;padding:14px;border-radius:25px;border:none;font-size:16px;font-weight:600;color:#fff;cursor:pointer;font-family:inherit;transition:opacity .2s;width:calc(100% - 32px)}
.sbtn:active{opacity:.8}
.sbtn-e{background:linear-gradient(135deg,var(--orange),var(--orange-dark))}
.sbtn-i{background:linear-gradient(135deg,var(--green),#388E3C)}
/* Section title */
.stit{font-size:13px;font-weight:600;color:var(--text-sub);padding:12px 16px 6px;display:flex;justify-content:space-between;align-items:center}
.stit button{background:none;border:none;color:var(--orange);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
/* Tx list */
.txl{padding:0 16px}
.txi{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.tx-icon{width:40px;height:40px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tx-info{flex:1;min-width:0}
.tx-cat{font-size:14px;font-weight:500}
.tx-memo{font-size:11px;color:var(--text-sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-amt{font-size:15px;font-weight:600;text-align:right;white-space:nowrap}
.tx-amt.inc{color:var(--green)}.tx-amt.exp{color:var(--red)}
/* Summary */
.srow{display:flex;gap:10px;padding:12px 16px}
.scard{flex:1;background:var(--card);border-radius:var(--radius);padding:14px 12px;box-shadow:var(--shadow);text-align:center}
.scard .lb{font-size:11px;color:var(--text-sub);font-weight:500;margin-bottom:4px}
.scard .vl{font-size:18px;font-weight:700}
.vl.inc{color:var(--green)}.vl.exp{color:var(--red)}.vl.bal{color:var(--orange)}
/* FAB */
.fab{position:fixed;bottom:calc(var(--tab-h) + var(--safe-b) + 16px);right:calc(50% - 220px);width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--orange),var(--orange-dark));color:#fff;display:flex;align-items:center;justify-content:center;border:none;box-shadow:0 4px 16px rgba(245,166,35,.4);cursor:pointer;z-index:90;transition:transform .2s}
.fab:active{transform:scale(.92)}
/* Calendar */
.cw{padding:8px 12px}
.ch{display:flex;align-items:center;justify-content:space-between;padding:4px 4px 10px}
.ch h2{font-size:16px;font-weight:600}
.cwk{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;font-size:11px;color:var(--text-sub);font-weight:500;margin-bottom:4px}
.cgr{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cd{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:13px;border-radius:8px;cursor:pointer;position:relative;transition:background .15s;gap:1px}
.cd:active{background:#F0EEEB}
.cd.tod{background:var(--orange-light);font-weight:700}
.cd.sel{background:var(--orange);color:#fff;font-weight:600}
.cd.oth{color:#ccc}
.cd .dot{font-size:7px;line-height:1}
.dot.di{color:var(--green)}.dot.de{color:var(--red)}
.cd.sel .dot{color:rgba(255,255,255,.7)}
/* Card */
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);margin:12px 16px;overflow:hidden}
.card-h{padding:14px 16px;font-size:14px;font-weight:600;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-b{padding:12px 16px}
/* Chart bars */
.cb-wrap{display:flex;align-items:flex-end;gap:6px;height:160px;padding:0 16px 8px}
.cb-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.cb{width:100%;border-radius:4px 4px 0 0;min-height:2px;transition:height .4s}
.cb-lb{font-size:9px;color:var(--text-sub)}
/* Legend */
.leg{display:flex;flex-wrap:wrap;gap:8px;padding:8px 16px}
.leg-it{display:flex;align-items:center;gap:4px;font-size:11px}
.leg-dot{width:10px;height:10px;border-radius:50%}
/* Report table */
.rtbl{width:100%;border-collapse:collapse;font-size:12px}
.rtbl th,.rtbl td{padding:8px 6px;border:1px solid #ddd;text-align:left}
.rtbl th{background:#f5f5f5;font-weight:600;font-size:11px}
.rtbl .num{text-align:right;font-variant-numeric:tabular-nums}
.rtit{font-size:18px;font-weight:700;text-align:center;margin:16px 0 8px}
.rsub{font-size:12px;text-align:center;color:var(--text-sub);margin-bottom:16px}
.rsec{font-size:13px;font-weight:600;padding:16px 0 6px;border-bottom:2px solid #333}
/* Member */
.mi{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--border)}
.mav{width:40px;height:40px;border-radius:50%;background:var(--orange-light);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:600;color:var(--orange);flex-shrink:0}
.minfo{flex:1}.mname{font-size:14px;font-weight:500}.msub{font-size:11px;color:var(--text-sub)}
.macts{display:flex;gap:8px}
.macts button{background:none;border:none;cursor:pointer;padding:6px;color:var(--text-sub);border-radius:6px}
.macts button:active{background:var(--border)}
/* Settings */
.si{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer}
.si .lb{font-size:14px}.si .vl{font-size:13px;color:var(--text-sub)}
/* Buttons */
.btn{padding:10px 20px;border-radius:8px;border:none;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;transition:opacity .2s}
.btn:active{opacity:.8}
.btn-o{background:var(--orange);color:#fff}
.btn-g{background:var(--green);color:#fff}
.btn-out{background:transparent;border:1.5px solid var(--border);color:var(--text)}
.btn-d{background:var(--red);color:#fff}
.btn-sm{padding:6px 14px;font-size:12px}
/* Modal */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:flex;align-items:flex-end;justify-content:center;animation:fi .2s}
.modal{background:var(--bg);width:100%;max-width:480px;max-height:92vh;border-radius:16px 16px 0 0;overflow-y:auto;animation:su .3s;padding-bottom:calc(var(--safe-b) + 16px)}
.modal-h{display:flex;align-items:center;justify-content:space-between;padding:16px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:1}
.modal-h h2{font-size:16px;font-weight:600}
.modal-c{background:none;border:none;cursor:pointer;color:var(--text-sub);padding:4px}
@keyframes fi{from{opacity:0}to{opacity:1}}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
/* Confirm */
.conf-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:flex;align-items:center;justify-content:center}
.conf{background:#fff;border-radius:14px;padding:24px;width:280px;text-align:center}
.conf h3{font-size:16px;margin-bottom:8px}
.conf p{font-size:13px;color:var(--text-sub);margin-bottom:16px}
.conf-a{display:flex;gap:10px;justify-content:center}
/* Toast */
.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);z-index:300;background:#333;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:500;animation:fi .3s;box-shadow:0 4px 12px rgba(0,0,0,.15)}
/* Empty */
.empty{text-align:center;padding:40px 20px;color:var(--text-sub)}
.empty p{font-size:13px}
/* Print */
@media print{.tabs,.fab,.hdr,.no-print{display:none!important}.main{padding-bottom:0!important;overflow:visible!important}.app{max-width:100%!important;height:auto!important}.rtbl{font-size:10px}.rtbl th,.rtbl td{padding:4px}}
</style>

// Category icons as inline SVG
function catIcon(cat, type) {

// ─── Data Store ───
let D;
function defaultData(){return{
  years:[{id:"2025",name:"2025年度",startDate:"2025-04-01",endDate:"2026-03-31"}],
  members:[],incomes:[],expenses:[],
  incomeCategories:["団費","臨時徴収","寄付","その他"],
  expenseCategories:["会場費","楽譜","備品","交通費","謝礼","印刷費","その他"],
  settings:{currentYearId:"2025"}
}}
function loadDB(){try{const s=localStorage.getItem(DB_KEY);return s?{...defaultData(),...JSON.parse(s)}:defaultData()}catch(e){return defaultData()}}
function saveDB(){try{localStorage.setItem(DB_KEY,JSON.stringify(D))}catch(e){}}
D = loadDB();

// ─── State ───
let activeTab = 0;
let toastTimer = null;
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);
const h = (tag, cls, html, attrs) => {
  let el = `<${tag}${cls?' class="'+cls+'"':''}`;
  if(attrs) for(const[k,v]of Object.entries(attrs)) el+=` ${k}="${v}"`;
  el += `>${html||''}</${tag}>`;
  return el;
};

function showToast(msg){
  let t=$('.toast');
  if(t)t.remove();
  document.body.insertAdjacentHTML('beforeend',`<div class="toast">${msg}</div>`);
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{const t=$('.toast');if(t)t.remove()},2000);
}

function getYear(){return D.years.find(y=>y.id===D.settings.currentYearId)||D.years[0]}
function yearIncomes(){return D.incomes.filter(i=>i.yearId===getYear()?.id).sort((a,b)=>b.date.localeCompare(a.date))}
function yearExpenses(){return D.expenses.filter(e=>e.yearId===getYear()?.id).sort((a,b)=>b.date.localeCompare(a.date))}

// ─── Render ───
function render(){
  const yr = getYear();
  const tabLabels = [
    {l:'入力',i:IC.edit},{l:'カレンダー',i:IC.cal},{l:'グラフ',i:IC.chart},
    {l:'報告書',i:IC.report},{l:'メンバー',i:IC.members},{l:'設定',i:IC.settings}
  ];
  let mainHTML = '';
  switch(activeTab){
    case 0: mainHTML = renderInput(); break;
    case 1: mainHTML = renderCalendar(); break;
    case 2: mainHTML = renderChart(); break;
    case 3: mainHTML = renderReport(); break;
    case 4: mainHTML = renderMembers(); break;
    case 5: mainHTML = renderSettings(); break;
  }
  const tabsHTML = tabLabels.map((t,i)=>
    `<button class="tab ${activeTab===i?'on':''}" onclick="switchTab(${i})">${t.i}<span>${t.l}</span></button>`
  ).join('');
  
  $('#app').innerHTML = `<div class="main" id="main">${mainHTML}</div><div class="tabs">${tabsHTML}</div>`;
  bindEvents();
}

function switchTab(i){activeTab=i;render();}
window.switchTab=switchTab;

window.inputMode = m => { inputState.mode=m; inputState.category=''; render(); };
window.inputDateShift = dir => { const d=new Date(inputState.date); d.setDate(d.getDate()+dir); inputState.date=toDS(d); render(); };

window.submitInput = () => {

  if(!s.amount||Number(s.amount)<=0){showToast('金額を入力してください');return;}

// CALENDAR TAB
// ═══════════════════════════════════
let calState = { viewDate: new Date(), selectedDate: todayStr() };

function renderCalendar(){
  const vd = calState.viewDate;
  const yr = vd.getFullYear(), mo = vd.getMonth();
  const firstDay = new Date(yr,mo,1).getDay();
  const dim = new Date(yr,mo+1,0).getDate();
  const prevDim = new Date(yr,mo,0).getDate();
  const inc = yearIncomes(), exp = yearExpenses();
  
  // Monthly totals
  const mInc = inc.filter(i=>{const d=new Date(i.date);return d.getMonth()===mo&&d.getFullYear()===yr}).reduce((s,i)=>s+i.amount,0);
  const mExp = exp.filter(e=>{const d=new Date(e.date);return d.getMonth()===mo&&d.getFullYear()===yr}).reduce((s,e)=>s+e.amount,0);
  
  // Day amounts map
  const dayMap = {};
  inc.forEach(i=>{if(!dayMap[i.date])dayMap[i.date]={i:0,e:0};dayMap[i.date].i+=i.amount;});
  exp.forEach(e=>{if(!dayMap[e.date])dayMap[e.date]={i:0,e:0};dayMap[e.date].e+=e.amount;});
  
  let days = [];
  for(let i=firstDay-1;i>=0;i--) days.push({d:prevDim-i,cur:false});
  for(let i=1;i<=dim;i++) days.push({d:i,cur:true});
  const rem=7-(days.length%7); if(rem<7) for(let i=1;i<=rem;i++) days.push({d:i,cur:false});
  
  const daysHTML = days.map(dd=>{
    const ds = dd.cur ? `${yr}-${String(mo+1).padStart(2,'0')}-${String(dd.d).padStart(2,'0')}` : '';
    const a = ds ? dayMap[ds] : null;
    const isT = ds===todayStr(), isS = ds===calState.selectedDate;
    let cls = 'cd'; if(!dd.cur)cls+=' oth'; if(isT)cls+=' tod'; if(isS)cls+=' sel';
    let dots = '';
    if(a){
      dots='<div style="display:flex;gap:2px">';
      if(a.i>0) dots+='<span class="dot di">●</span>';
      if(a.e>0) dots+='<span class="dot de">●</span>';
      dots+='</div>';
    }
    return `<div class="${cls}" onclick="calDayClick('${ds}')">${dd.d}${dots}</div>`;
  }).join('');
  
  // Selected day transactions
  const sd = calState.selectedDate;
  const dayTx = [...inc.filter(i=>i.date===sd).map(i=>({...i,_t:'income'})),...exp.filter(e=>e.date===sd).map(e=>({...e,_t:'expense'}))];
  let txHTML = '';
  if(dayTx.length===0) txHTML='<div class="empty"><p>この日の記録はありません</p></div>';
  else txHTML = dayTx.map(tx=>{
    const ic = catIcon(tx.category, tx._t);
    return `<div class="txi">
      <div class="tx-icon">${ic}</div>
      <div class="tx-info"><div class="tx-cat">${tx.category}</div><div class="tx-memo">${tx.memo||tx.payee||'—'}</div></div>
      <div class="tx-amt ${tx._t==='income'?'inc':'exp'}">${tx._t==='income'?'+':'−'}¥${fmt(tx.amount)}</div>
      <button style="background:none;border:none;padding:4px;cursor:pointer;color:#ccc" onclick="deleteTx('${tx.id}','${tx._t}')">${IC.trash}</button>
    </div>`;
  }).join('');

  return `
    <div class="hdr"><h1>カレンダー</h1></div>
    <div class="srow">
      <div class="scard"><div class="lb">収入</div><div class="vl inc">¥${fmt(mInc)}</div></div>
      <div class="scard"><div class="lb">支出</div><div class="vl exp">¥${fmt(mExp)}</div></div>
    </div>
    <div class="cw">
      <div class="ch">
        <button class="dbtn" onclick="calMonth(-1)">${IC.chevL}</button>
        <h2>${yr}年${mo+1}月</h2>
        <button class="dbtn" onclick="calMonth(1)">${IC.chevR}</button>
      </div>
      <div class="cwk">${["日","月","火","水","木","金","土"].map(d=>`<div>${d}</div>`).join('')}</div>
      <div class="cgr">${daysHTML}</div>
    </div>
    <div style="padding:8px 16px;display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:14px;font-weight:600">${fmtFull(sd)}</span>
      <button class="btn btn-o btn-sm" onclick="openAddModal('${sd}')" style="display:flex;align-items:center;gap:4px">${IC.plus}<span style="font-size:12px">追加</span></button>
    </div>
    <div class="txl">${txHTML}</div>
    <button class="fab" onclick="openAddModal('${sd}')">${IC.plus}</button>
  `;
}

window.calMonth = dir => { calState.viewDate.setMonth(calState.viewDate.getMonth()+dir); render(); };
window.calDayClick = ds => { if(ds){ calState.selectedDate=ds; render(); }};
window.deleteTx = (id, type) => {
  if(type==='income') D.incomes=D.incomes.filter(i=>i.id!==id);
  else D.expenses=D.expenses.filter(e=>e.id!==id);
  saveDB(); showToast('削除しました'); render();
};

    D[catKey].push(inp.value.trim()); saveDB(); showToast('追加しました'); renderCE();
  };
  window.ceDel = c => { D[catKey]=D[catKey].filter(x=>x!==c); saveDB(); showToast('削除しました'); renderCE(); };
  renderCE();
};

// ═══════════════════════════════════
// CHART TAB
// ═══════════════════════════════════
let chartMode = 'monthly';
function renderChart(){
  const inc=yearIncomes(), exp=yearExpenses();
  const tI=inc.reduce((s,i)=>s+i.amount,0), tE=exp.reduce((s,e)=>s+e.amount,0);
  const yr=getYear();
  
  let content='';
  if(chartMode==='monthly'){
    const startM=new Date(yr.startDate).getMonth(), startY=new Date(yr.startDate).getFullYear();
    let months=[];
    for(let i=0;i<12;i++){
      const m=(startM+i)%12, y=startY+Math.floor((startM+i)/12);
      const key=`${y}-${String(m+1).padStart(2,'0')}`;
      months.push({
        label:`${m+1}月`,
        income:inc.filter(x=>x.date.startsWith(key)).reduce((s,x)=>s+x.amount,0),
        expense:exp.filter(x=>x.date.startsWith(key)).reduce((s,x)=>s+x.amount,0)
      });
    }
    const max=Math.max(...months.map(m=>Math.max(m.income,m.expense)),1);
    const bars=months.map(m=>
      `<div class="cb-item"><div style="display:flex;gap:2px;align-items:flex-end;height:100%;width:100%"><div class="cb" style="flex:1;height:${(m.income/max)*130}px;background:#4CAF50;opacity:.7"></div><div class="cb" style="flex:1;height:${(m.expense/max)*130}px;background:#EF5350;opacity:.7"></div></div><div class="cb-lb">${m.label}</div></div>`
    ).join('');
    content = `<div class="card"><div class="card-h">月別 収入・支出</div><div style="padding:12px 0"><div class="cb-wrap">${bars}</div><div class="leg" style="justify-content:center"><div class="leg-it"><div class="leg-dot" style="background:#4CAF50"></div>収入</div><div class="leg-it"><div class="leg-dot" style="background:#EF5350"></div>支出</div></div></div></div>`;
  } else {
    const colors=["#F5A623","#4CAF50","#2196F3","#E91E63","#9C27B0","#FF5722","#00BCD4","#795548","#607D8B","#FF9800"];
    const expByCat={}, incByCat={};
    exp.forEach(e=>{expByCat[e.category]=(expByCat[e.category]||0)+e.amount});
    inc.forEach(i=>{incByCat[i.category]=(incByCat[i.category]||0)+i.amount});
    const eSorted=Object.entries(expByCat).sort((a,b)=>b[1]-a[1]);
    const iSorted=Object.entries(incByCat).sort((a,b)=>b[1]-a[1]);
    
    const renderCatCard = (title, sorted, total) => {
      if(sorted.length===0) return `<div class="card"><div class="card-h">${title}</div><div class="card-b"><div class="empty"><p>データなし</p></div></div></div>`;
      const rows = sorted.map(([c,a],i)=>
        `<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px"><div class="leg-dot" style="background:${colors[i%colors.length]};flex-shrink:0"></div><span style="flex:1;font-size:13px">${c}</span><span style="font-size:13px;font-weight:600">¥${fmt(a)}</span><span style="font-size:11px;color:var(--text-sub);width:40px;text-align:right">${total?Math.round(a/total*100):0}%</span></div>`
      ).join('');
      const bar = sorted.map(([c,a],i)=>`<div style="width:${(a/total)*100}%;background:${colors[i%colors.length]}"></div>`).join('');
      return `<div class="card"><div class="card-h">${title}</div><div class="card-b">${rows}</div><div style="padding:0 16px 12px"><div style="display:flex;height:20px;border-radius:10px;overflow:hidden">${bar}</div></div></div>`;
    };
    content = renderCatCard('支出カテゴリー', eSorted, tE) + renderCatCard('収入カテゴリー', iSorted, tI);
  }

  return `
    <div class="hdr"><h1>グラフ</h1></div>
    <div class="srow">
      <div class="scard"><div class="lb">収入合計</div><div class="vl inc">¥${fmt(tI)}</div></div>
      <div class="scard"><div class="lb">支出合計</div><div class="vl exp">¥${fmt(tE)}</div></div>
      <div class="scard"><div class="lb">残高</div><div class="vl bal">¥${fmt(tI-tE)}</div></div>
    </div>
    <div class="tog">
      <button class="${chartMode==='monthly'?'on-e':''}" onclick="chartMode='monthly';render()">月別推移</button>
      <button class="${chartMode==='category'?'on-i':''}" onclick="chartMode='category';render()">カテゴリー</button>
    </div>
    ${content}
  `;
}

// ═══════════════════════════════════
// REPORT TAB
// ═══════════════════════════════════
function renderReport(){
  const yr=getYear(), inc=yearIncomes(), exp=yearExpenses();
  const tI=inc.reduce((s,i)=>s+i.amount,0), tE=exp.reduce((s,e)=>s+e.amount,0), bal=tI-tE;
  
  const incByCat={}, expByCat={};
  inc.forEach(i=>{incByCat[i.category]=(incByCat[i.category]||0)+i.amount});
  exp.forEach(e=>{expByCat[e.category]=(expByCat[e.category]||0)+e.amount});
  const iCats=Object.entries(incByCat).sort((a,b)=>a[0].localeCompare(b[0]));
  const eCats=Object.entries(expByCat).sort((a,b)=>a[0].localeCompare(b[0]));
  
  const incRows=iCats.map(([c,a])=>`<tr><td>${c}</td><td class="num">¥${fmt(a)}</td></tr>`).join('');
  const expRows=eCats.map(([c,a])=>`<tr><td>${c}</td><td class="num">¥${fmt(a)}</td></tr>`).join('');
  
  const incDetail = inc.sort((a,b)=>a.date.localeCompare(b.date)).map(i=>`<tr><td>${fmtShort(i.date)}</td><td>${i.category}</td><td class="num">¥${fmt(i.amount)}</td><td>${i.memo||'—'}</td></tr>`).join('');
  const expDetail = exp.sort((a,b)=>a.date.localeCompare(b.date)).map(e=>`<tr><td>${fmtShort(e.date)}</td><td>${e.category}</td><td class="num">¥${fmt(e.amount)}</td><td>${e.payee||'—'}</td><td>${e.memo||'—'}</td></tr>`).join('');
  
  const memberRows = D.members.map(m=>{
    const dues=inc.filter(i=>i.memberId===m.id&&i.category==='団費').reduce((s,i)=>s+i.amount,0);
    const sp=inc.filter(i=>i.memberId===m.id&&i.category==='臨時徴収').reduce((s,i)=>s+i.amount,0);
    return `<tr><td>${m.name}${m.leaveDate?' (退団)':''}</td><td class="num">¥${fmt(dues)}</td><td class="num">¥${fmt(sp)}</td><td class="num">¥${fmt(dues+sp)}</td></tr>`;
  }).join('');

  return `
    <div class="hdr"><h1>報告書</h1>
      <div class="hdr-r">
        <button onclick="exportCSV()" title="CSV出力">${IC.dl}</button>
        <button onclick="window.print()" title="印刷">${IC.print}</button>
      </div>
    </div>
    <div style="padding:0 12px">
      <div class="rtit">${yr?.name} 収支決算報告書</div>
      <div class="rsub">期間：${yr?.startDate?.replace(/-/g,'/')} 〜 ${yr?.endDate?.replace(/-/g,'/')}</div>
      
      <div class="rsec">【収入の部】</div>
      <table class="rtbl"><thead><tr><th style="width:50%">科目</th><th style="width:50%">金額</th></tr></thead>
      <tbody>${incRows}<tr style="font-weight:700;background:#FFF3E0"><td>収入合計</td><td class="num">¥${fmt(tI)}</td></tr></tbody></table>
      
      <div class="rsec">【支出の部】</div>
      <table class="rtbl"><thead><tr><th style="width:50%">科目</th><th style="width:50%">金額</th></tr></thead>
      <tbody>${expRows}<tr style="font-weight:700;background:#FFEBEE"><td>支出合計</td><td class="num">¥${fmt(tE)}</td></tr></tbody></table>
      
      <table class="rtbl" style="margin-top:16px"><tbody><tr style="font-weight:700;background:#E8F5E9;font-size:14px"><td style="width:50%">差引残高</td><td class="num" style="width:50%">¥${fmt(bal)}</td></tr></tbody></table>
      
      <div class="rsec">【収入明細】</div>
      <table class="rtbl"><thead><tr><th>日付</th><th>科目</th><th>金額</th><th>メモ</th></tr></thead><tbody>${incDetail}</tbody></table>
      
      <div class="rsec">【支出明細】</div>
      <table class="rtbl"><thead><tr><th>日付</th><th>科目</th><th>金額</th><th>支払先</th><th>メモ</th></tr></thead><tbody>${expDetail}</tbody></table>
      
      <div class="rsec">【団員別集金状況】</div>
      <table class="rtbl"><thead><tr><th>団員名</th><th>団費</th><th>臨時徴収</th><th>合計</th></tr></thead><tbody>${memberRows}</tbody></table>
      
      <div style="text-align:center;padding:24px 0;font-size:12px;color:var(--text-sub)">作成日：${fmtFull(todayStr())}</div>
    </div>
  `;
}

window.exportCSV = () => {
  const inc=yearIncomes(), exp=yearExpenses();
  let csv = "種別,日付,カテゴリー,金額,メモ,支払先/団員\n";
  inc.forEach(i=>{const m=D.members.find(x=>x.id===i.memberId);csv+=`収入,${i.date},${i.category},${i.amount},${i.memo||''},${m?m.name:''}\n`;});
  exp.forEach(e=>{csv+=`支出,${e.date},${e.category},${e.amount},${e.memo||''},${e.payee||''}\n`;});
  const blob=new Blob(["\uFEFF"+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`${getYear()?.name||'会計'}_収支データ.csv`;a.click();
};

window.openMemberForm = (id) => {
  const m = id ? D.members.find(x=>x.id===id) : null;
  const html = `<div class="modal-ov" onclick="closeModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-h"><h2>${m?'団員編集':'団員追加'}</h2><button class="modal-c" onclick="closeModal()">${IC.close}</button></div>
      <div style="padding:16px;display:flex;flex-direction:column;gap:12px">
        <div><label class="fl">氏名 *</label><input class="fi" id="mfName" value="${m?m.name:''}" placeholder="山田 太郎"></div>
        <div><label class="fl">加入日</label><input class="fi" type="date" id="mfJoin" value="${m?m.joinDate:todayStr()}"></div>
        <div><label class="fl">退団日（任意）</label><input class="fi" type="date" id="mfLeave" value="${m?.leaveDate||''}"></div>
        <div><label class="fl">備考</label><input class="fi" id="mfNote" value="${m?.note||''}" placeholder="パート等"></div>
        <button class="btn btn-o" style="width:100%;padding:14px;font-size:16px;border-radius:25px" onclick="saveMember('${id||''}')">${m?'更新する':'追加する'}</button>
      </div>

  </div>`;

};

window.saveMember = (id) => {
  const name=$('#mfName').value.trim(), join=$('#mfJoin').value, leave=$('#mfLeave').value, note=$('#mfNote').value;
  if(!name){showToast('氏名を入力してください');return;}
  if(id){
    D.members=D.members.map(m=>m.id===id?{...m,name,joinDate:join,leaveDate:leave||null,note}:m);
    showToast('更新しました');
  } else {
    D.members.push({id:uuid(),name,joinDate:join,leaveDate:leave||null,note});
    showToast('追加しました');
  }
  saveDB(); closeModal(); render();
};

window.deleteMember = (id, name) => {
  showConfirm('団員を削除', `${name}を削除しますか？`, ()=>{
    D.members=D.members.filter(m=>m.id!==id); saveDB(); showToast('削除しました'); render();
  });
};

    `<div class="si" onclick="switchYear('${y.id}')"><span class="lb">${y.name}</span><span class="vl" ${y.id===D.settings.currentYearId?'style="color:var(--orange)"':''}>${y.id===D.settings.currentYearId?'✓ 選択中':y.startDate+'〜'}</span></div>`

window.switchYear = id => { D.settings.currentYearId=id; saveDB(); showToast('年度を切り替えました'); render(); };

window.openYearForm = () => {
  const next = Math.max(...D.years.map(y=>Number(y.id)))+1;
  const html=`<div class="modal-ov" onclick="closeModal()"><div class="modal" onclick="event.stopPropagation()">
    <div class="modal-h"><h2>年度追加</h2><button class="modal-c" onclick="closeModal()">${IC.close}</button></div>
    <div style="padding:16px;display:flex;flex-direction:column;gap:12px">
      <div><label class="fl">年度ID</label><input class="fi" id="yfId" value="${next}"></div>
      <div><label class="fl">開始日</label><input class="fi" type="date" id="yfStart" value="${next}-04-01"></div>
      <div><label class="fl">終了日</label><input class="fi" type="date" id="yfEnd" value="${next+1}-03-31"></div>
      <button class="btn btn-o" style="width:100%;padding:14px;font-size:16px;border-radius:25px" onclick="saveYear()">追加する</button>
    </div>
  </div></div>`;
  let el=document.getElementById('modalLayer');if(!el){el=document.createElement('div');el.id='modalLayer';document.body.appendChild(el);}el.innerHTML=html;

window.saveYear = () => {
  const id=$('#yfId').value, s=$('#yfStart').value, e=$('#yfEnd').value;
  if(!id||!s||!e){showToast('全項目を入力してください');return;}
  if(D.years.find(y=>y.id===id)){showToast('既に存在します');return;}
  D.years.push({id,name:id+'年度',startDate:s,endDate:e}); saveDB(); showToast('追加しました'); closeModal(); render();
};

window.exportAll = () => {
  const blob=new Blob([JSON.stringify(D,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`choir_backup_${todayStr()}.json`;a.click();
};

window.importJSON = el => {
  const f=el.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.members&&d.incomes&&d.expenses){D={...defaultData(),...d};saveDB();showToast('インポートしました');render();}else showToast('形式が不正です');}catch{showToast('読み込み失敗');}};
  r.readAsText(f);
};

window.importCSV = el => {
  const f=el.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{try{
    const lines=ev.target.result.split('\n').filter(l=>l.trim());
    if(lines.length<2){showToast('データが空です');return;}
    const hdr=lines[0].split(',').map(h=>h.trim().replace(/"/g,''));
    for(let i=1;i<lines.length;i++){
      const c=lines[i].split(',').map(x=>x.trim().replace(/"/g,''));
      if(c.length<4)continue;
      const tI=hdr.indexOf('種別'),dI=hdr.indexOf('日付'),cI=hdr.indexOf('カテゴリー'),aI=hdr.indexOf('金額'),mI=hdr.indexOf('メモ');
      const type=tI>=0?c[tI]:c[0], date=dI>=0?c[dI]:c[1], cat=cI>=0?c[cI]:c[2], amt=Number(aI>=0?c[aI]:c[3]), memo=mI>=0?c[mI]:(c[4]||'');
      if(type==='収入') D.incomes.push({id:uuid(),date,type:'other',memberId:null,category:cat,amount:amt,memo,yearId:D.settings.currentYearId});
      else if(type==='支出') D.expenses.push({id:uuid(),date,category:cat,amount:amt,payee:'',memo,yearId:D.settings.currentYearId});
    }
    saveDB();showToast('CSVインポートしました');render();
  }catch{showToast('読み込み失敗');}};
  r.readAsText(f);
};

window.clearAllData = () => {
  showConfirm('全データ削除','すべてのデータを削除してよろしいですか？\nこの操作は元に戻せません。',()=>{
    D=defaultData();saveDB();showToast('削除しました');render();
  });
};

  document.getElementById('confOk').onclick=()=>{onOk();closeConfirm();};
}
